<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vente Padel Galis - Casablanca</title>
    <style>
        :root {
            /* Votre couleur spécifique RGB: 49, 65, 82 */
            --brand-color: rgb(49, 65, 82);
            --accent-blue: #00a8ff;
            --overlay: rgba(49, 65, 82, 0.88);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            background-color: var(--brand-color);
            scroll-behavior: smooth;
        }

        /* Effet Parallax : Images de fond fixes */
        .parallax {
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        .content-section {
            background-color: var(--overlay);
            padding: 80px 20px;
            width: 100%;
            box-sizing: border-box;
        }

        /* Images de fond représentatives */
        .bg-1 { background-image: url('https://images.unsplash.com/photo-1626224484214-4051d08214f5?q=80&w=2070'); }
        .bg-2 { background-image: url('https://images.unsplash.com/photo-1592709823125-a191f07a2a5e?q=80&w=2013'); }
        .bg-3 { background-image: url('https://images.unsplash.com/photo-1554068865-24cecd4e34b8?q=80&w=2070'); }

        .logo-wrapper {
            width: 320px;
            max-width: 90%;
            margin: 0 auto 40px auto;
        }

        /* Style du Logo SVG officiel */
        .logo-wrapper svg {
            width: 100%;
            height: auto;
            filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.4));
        }

        h1 { font-size: 3rem; text-transform: uppercase; margin: 0; letter-spacing: 2px; }
        h2 { font-size: 2.2rem; text-transform: uppercase; margin-bottom: 30px; border-bottom: 2px solid var(--accent-blue); display: inline-block; padding-bottom: 10px; }
        
        p { font-size: 1.2rem; max-width: 850px; margin: 20px auto; line-height: 1.8; }

        .badge {
            background: #e63946;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 25px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1100px;
            margin: 40px auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            padding: 35px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); }
        .card h3 { margin-top: 0; color: var(--accent-blue); font-size: 1.6rem; }

        .contact-container {
            padding: 120px 20px;
            background-color: var(--brand-color);
            text-align: center;
        }

        .phone-link {
            font-size: 4.5rem;
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: bold;
            display: block;
            margin-top: 20px;
            transition: color 0.3s;
        }

        .phone-link:hover { color: white; }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            h2 { font-size: 1.5rem; }
            .phone-link { font-size: 2.5rem; }
            .content-section { padding: 50px 20px; }
        }
    </style>
</head>
